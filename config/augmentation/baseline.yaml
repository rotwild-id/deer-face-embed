# @package job.training_config.augmentation_config
augmentations:
  - KIND: RandomPhotometricDistort
    brightness: [0.9, 1.1]
    contrast: [0.8, 1.2]
    saturation: [0.8, 1.2]
    hue: [-0.01, 0.01]
    p: 0.5
  - KIND: RandomHorizontalFlip
    p: 0.5
  - KIND: RandomGrayscale
    p: 0.1
  - KIND: RandomGaussianBlur
    kernel_size: [3, 5]
    sigma: [0.1, 1.5]
    p: 0.3
